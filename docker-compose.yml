services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=sharaga_miniapp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - sharaga_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    image: ghcr.io/jlucky94/sharaga-miniapp-api:latest
    environment:
      - PORT=3001
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped

  web:
    image: ghcr.io/jlucky94/sharaga-miniapp-web:latest
    ports:
      - "127.0.0.1:8090:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sharaga_postgres_data:
